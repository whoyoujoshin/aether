syntax = "proto3";
package aether.pow.v1;

import "gogoproto/gogo.proto";
import "cosmos/msg/v1/msg.proto";

option go_package = "github.com/whoyoujoshin/aether/x/pow";

service Msg {
  rpc SubmitPoW(MsgSubmitPoW) returns (MsgSubmitPoWResponse);
  rpc RegisterValidatorPubkey(MsgRegisterValidatorPubkey) returns (MsgRegisterValidatorPubkeyResponse);
}

message MsgRegisterValidatorPubkey {
  string miner = 1;
  bytes consensus_pubkey = 2; // raw 32-byte ed25519 public key
}

message MsgRegisterValidatorPubkeyResponse {}

message MsgSubmitPoW {
  option (cosmos.msg.v1.signer) = "miner";
  string miner       = 1;
  uint64 height      = 2;
  int64  timestamp   = 3;
  bytes  prev_hash   = 4;
  bytes  merkle_root = 5;
  uint64 nonce       = 6;
  uint64 difficulty  = 7;
}

message MsgSubmitPoWResponse {}
